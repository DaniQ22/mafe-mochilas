<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold text-gray-800 mb-6 text-center">Acceso</h1>

    <form (ngSubmit)="submit()" #loginForm="ngForm" class="flex flex-col gap-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1" for="username">Usuario</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1" for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

      <p *ngIf="error" class="text-sm text-red-500 text-center">{{ error }}</p>

      <button
        type="submit"
        [disabled]="isLoading || !loginForm.valid"
        class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-medium py-2 rounded-lg transition-colors"
      >
        {{ isLoading ? 'Verificando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
